<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我們的家 - 雲端庫存</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: #FAF8F5; color: #5C4D3C; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); }
        #reader video { border-radius: 20px !important; }
        #reader__dashboard_section_csr button { background: #A4907C !important; color: white !important; padding: 10px 20px !important; border-radius: 12px !important; border: none !important; font-weight: bold !important; margin: 10px auto !important; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-[#D4C4B7] p-4 sticky top-0 z-50 rounded-b-3xl shadow-sm flex justify-between items-center max-w-md mx-auto">
        <h1 class="text-xl font-bold flex items-center gap-2">📦 我們的家</h1>
        <div id="displayFamilyCode" class="text-xs bg-[#F5EFE6] px-3 py-1 rounded-full font-bold border border-[#C4B4A7]">群組: --</div>
    </header>

    <main id="app" class="p-4 max-w-md mx-auto min-h-[70vh]">
        <div id="loading" class="text-center py-20 text-[#A4907C]">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-[#D4C4B7] border-t-transparent rounded-full mb-4"></div>
            <p class="text-lg font-bold">正在連線雲端...</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-[#E8DFCE] flex justify-around p-3 rounded-t-[32px] shadow-[0_-4px_15px_rgba(0,0,0,0.03)] z-50">
        <button onclick="showPage('list')" class="nav-btn flex flex-col items-center p-2 w-1/3 text-[#B0A395]">
            <span class="text-2xl">📋</span>
            <span class="text-[11px] mt-1 font-bold">清單</span>
        </button>
        <button onclick="showPage('add')" class="nav-btn flex flex-col items-center p-2 w-1/3">
            <div class="bg-[#A4907C] text-white p-3 rounded-2xl -mt-8 shadow-lg active:scale-95 transition-transform">
                <span class="text-2xl">＋</span>
            </div>
            <span class="text-[11px] mt-1 font-bold text-[#8E7860]">新增</span>
        </button>
        <button onclick="showPage('settings')" class="nav-btn flex flex-col items-center p-2 w-1/3 text-[#B0A395]">
            <span class="text-2xl">⚙️</span>
            <span class="text-[11px] mt-1 font-bold">同步</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 已經填入你提供的專屬金鑰 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSKX93lBA2H9fheiDA_M3Wc3nOHYGpGbo",
            authDomain: "stock-a5e10.firebaseapp.com",
            databaseURL: "https://stock-a5e10-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "stock-a5e10",
            storageBucket: "stock-a5e10.firebasestorage.app",
            messagingSenderId: "699679970059",
            appId: "1:699679970059:web:dfea8903261a804ac4880e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let familyCode = localStorage.getItem('familyCode') || 'HOME123';
        let items = [];
        let unsubscribe = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            else {
                updateFamilyCodeDisplay();
                startListening();
                showPage('list');
            }
        });

        function startListening() {
            if (unsubscribe) unsubscribe();
            const itemsRef = collection(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`);
            unsubscribe = onSnapshot(query(itemsRef), (snapshot) => {
                items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                items.sort((a, b) => (new Date(a.expiryDate || '9999') - new Date(b.expiryDate || '9999')));
                if (window.currentPage === 'list') renderList();
            }, (err) => alert("連線錯誤，請確認 Rules 已發佈！"));
        }

        window.showPage = (page) => {
            window.currentPage = page;
            if (page === 'list') renderList();
            else if (page === 'add') renderAddForm();
            else if (page === 'settings') renderSettings();
        };

        function renderList() {
            const container = document.getElementById('app');
            if (items.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-[40px] p-12 text-center border border-[#F0EBE1] mt-10 card-shadow"><div class="text-6xl mb-4">🏠</div><h2 class="text-xl font-bold text-[#7A6A58]">目前空空的</h2><p class="text-[#A4907C] text-sm mt-2">點擊＋開始記錄吧！</p></div>`;
                return;
            }
            let html = `<div class="grid gap-3">`;
            items.forEach(item => {
                const status = getExpiryInfo(item.expiryDate);
                html += `<div class="bg-white rounded-[24px] p-3 card-shadow border-l-[10px] ${status.border} flex items-center gap-3">
                    <div class="w-16 h-16 rounded-2xl bg-[#FAF8F5] flex items-center justify-center text-3xl border border-[#E8DFCE] overflow-hidden shrink-0">${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : getEmoji(item.category)}</div>
                    <div class="flex-1 min-w-0"><h3 class="font-bold text-[#5C4D3C] truncate">${item.name}</h3><p class="text-[12px] text-[#A4907C]">數:${item.quantity}</p><span class="text-[10px] font-bold px-2 py-0.5 rounded-lg ${status.bg} ${status.text}">${status.label}</span></div>
                    <button onclick="deleteItem('${item.id}', '${item.name}')" class="text-[#D69696] bg-[#FDF6F6] w-10 h-10 rounded-full flex items-center justify-center">✕</button>
                </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function renderAddForm() {
            const container = document.getElementById('app');
            container.innerHTML = `<div class="bg-white rounded-[32px] p-6 card-shadow border border-[#E8DFCE]"><h2 class="font-bold text-[#8E7860] mb-6 text-center">📝 新增紀錄</h2><div id="scannerContainer" class="hidden mb-4 rounded-2xl border-2 border-[#D4C4B7] overflow-hidden"><div id="reader"></div><button onclick="stopScanner()" class="w-full p-2 bg-[#F0EBE1] text-xs">取消掃描</button></div><div class="flex gap-3 mb-6" id="photoButtons"><button onclick="startScanner()" class="flex-1 h-20 bg-[#F5EFE6] rounded-[24px] border-2 border-[#A4907C] flex flex-col items-center justify-center"><span class="text-2xl">🔍</span><span class="text-xs font-bold">條碼</span></button><button onclick="document.getElementById('fileInput').click()" class="flex-1 h-20 bg-[#FAF8F5] rounded-[24px] border-2 border-dashed border-[#D4C4B7] flex flex-col items-center justify-center"><span id="photoPreview" class="text-2xl">📷</span><span class="text-xs font-bold">拍照</span></button><input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this)"></div><div class="space-y-4"><input type="text" id="itemName" placeholder="物品名稱" class="w-full p-4 border-2 border-[#E8DFCE] rounded-2xl outline-none bg-[#FAF8F5]"><input type="date" id="expiryDate" class="w-full p-4 border-2 border-[#E8DFCE] rounded-2xl outline-none bg-[#FAF8F5]"><div class="flex items-center gap-6 justify-center bg-[#FAF8F5] p-2 rounded-2xl border border-[#E8DFCE]"><button onclick="adjQty(-1)" class="w-10 h-10 bg-white border border-[#E8DFCE] rounded-xl font-bold">-</button><span id="qtyVal" class="text-xl font-bold">1</span><button onclick="adjQty(1)" class="w-10 h-10 bg-[#D4C4B7] text-white rounded-xl font-bold">+</button></div><button onclick="saveItem()" id="saveBtn" class="w-full bg-[#A4907C] text-white font-bold py-4 rounded-[24px] shadow-md mt-4">📦 儲存到雲端</button></div></div>`;
        }

        function renderSettings() {
            const container = document.getElementById('app');
            container.innerHTML = `<div class="bg-white rounded-[32px] p-6 card-shadow border border-[#E8DFCE]"><h3 class="font-bold text-[#8E7860] mb-3">🏠 同步代碼</h3><input type="text" id="newFamilyCode" value="${familyCode}" class="w-full p-4 border-2 border-[#D4C4B7] rounded-2xl text-center font-bold tracking-[4px] uppercase mb-4 bg-[#FAF8F5]"><button onclick="changeFamilyCode()" class="w-full bg-[#A4907C] text-white py-4 rounded-2xl font-bold">更新同步</button></div>`;
        }

        let currentQty = 1;
        let currentImg = '';
        let scanner = null;
        window.adjQty = (v) => { currentQty = Math.max(1, currentQty + v); document.getElementById('qtyVal').innerText = currentQty; };
        window.previewImage = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { currentImg = e.target.result; document.getElementById('photoPreview').innerText = "✅"; };
            reader.readAsDataURL(file);
        };
        window.startScanner = () => {
            document.getElementById('scannerContainer').classList.remove('hidden');
            document.getElementById('photoButtons').classList.add('hidden');
            if (!window.Html5QrcodeScanner) {
                const s = document.createElement('script'); s.src = "https://unpkg.com/html5-qrcode";
                s.onload = initScanner; document.body.appendChild(s);
            } else initScanner();
        };
        function initScanner() {
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render(async (text) => {
                scanner.clear(); stopScanner();
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${text}.json`);
                const data = await res.json();
                document.getElementById('itemName').value = data.status === 1 ? data.product.product_name : "未知物品";
            });
        }
        window.stopScanner = () => { if(scanner) scanner.clear(); document.getElementById('scannerContainer').classList.add('hidden'); document.getElementById('photoButtons').classList.remove('hidden'); };
        window.saveItem = async () => {
            const name = document.getElementById('itemName').value.trim();
            if (!name) return alert("請輸入名稱");
            await addDoc(collection(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`), {
                name, expiryDate: document.getElementById('expiryDate').value, quantity: currentQty,
                image: currentImg, category: '其他', createdAt: new Date().getTime()
            });
            showPage('list');
        };
        window.deleteItem = async (id, name) => { if (confirm(`刪除 ${name}？`)) await deleteDoc(doc(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`, id)); };
        window.changeFamilyCode = () => { familyCode = document.getElementById('newFamilyCode').value.toUpperCase(); localStorage.setItem('familyCode', familyCode); startListening(); showPage('list'); alert("同步成功！"); };
        function updateFamilyCodeDisplay() { document.getElementById('displayFamilyCode').innerText = `群組: ${familyCode}`; }
        function getEmoji(cat) { return '📦'; }
        function getExpiryInfo(date) {
            if (!date) return { label: '無日期', bg: 'bg-gray-100', text: 'text-gray-500', border: 'border-gray-200' };
            const diff = Math.ceil((new Date(date) - new Date().setHours(0,0,0,0)) / 86400000);
            if (diff < 0) return { label: '已過期', bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-400' };
            if (diff <= 7) return { label: `快到期`, bg: 'bg-yellow-100', text: 'text-yellow-800', border: 'border-yellow-400' };
            return { label: `新鮮`, bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-400' };
        }
    </script>
</body>
</html>
