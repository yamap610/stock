<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭庫存管家 - 奶茶日系風</title>
    <!-- 1. 引入必要的工具套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="date"] { min-height: 3rem; }
    </style>
</head>
<body class="bg-[#F5F0EA]">
    <div id="root"></div>

    <!-- 2. 引入 Firebase SDK (由外部載入) -->
    <script type="module" babel>
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- ⚠️ 您的 Firebase 設定 ---
        // 系統會自動帶入環境變數，若要自己部署，請替換成您在 Firebase 主控台看到的 config
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appIdPrefix = window.__app_id || 'home-inventory-v2';

        const { useState, useEffect, useRef } = React;

        // --- 3. 地點分類 ---
        const LOCATIONS = [
            { id: 'fridge', name: '冷藏', icon: '🧊', desc: '菜、肉、蛋' },
            { id: 'freezer', name: '冷凍', icon: '❄️', desc: '水餃、肉、冰品' },
            { id: 'kitchen', name: '廚房', icon: '🍳', desc: '泡麵、罐頭、醬料' },
            { id: 'snacks', name: '零食櫃', icon: '🍪', desc: '餅乾、糖果' },
            { id: 'hygiene', name: '衛生用品', icon: '🚿', desc: '衛生紙、牙膏' },
            { id: 'cleaning', name: '生活用品', icon: '🧽', desc: '洗碗、洗衣、垃圾袋' },
            { id: 'medicine', name: '藥品', icon: '💊', desc: '藥、OK繃' },
            { id: 'warehouse', name: '倉庫', icon: '📦', desc: '大量備品、雜物' },
            { id: 'other', name: '其他', icon: '🏷️', desc: '自訂位置' },
        ];

        // --- 4. 主程式組件 ---
        function App() {
            const [user, setUser] = useState(null);
            const [familyCode, setFamilyCode] = useState(localStorage.getItem('familyCode') || '');
            const [currentView, setCurrentView] = useState(familyCode ? 'dashboard' : 'login');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedLocation, setSelectedLocation] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [keyword, setKeyword] = useState('');

            // 登入
            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, setUser);
            }, []);

            // 監聽資料
            useEffect(() => {
                if (!user || !familyCode || currentView === 'login') {
                    setLoading(false);
                    return;
                }
                const itemsRef = collection(db, 'artifacts', appIdPrefix, 'public', `family_${familyCode}`);
                const unsubscribe = onSnapshot(itemsRef, (snapshot) => {
                    setItems(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user, familyCode, currentView]);

            // 過期判斷
            const getStatus = (date) => {
                if (!date) return { text: '正常', color: 'text-green-700', bg: 'bg-green-100', icon: 'check' };
                const days = Math.ceil((new Date(date) - new Date().setHours(0,0,0,0)) / 86400000);
                if (days < 0) return { text: '已過期', color: 'text-red-700', bg: 'bg-red-100', icon: 'alert' };
                if (days <= 3) return { text: `剩${days}天`, color: 'text-orange-700', bg: 'bg-orange-100', icon: 'clock' };
                return { text: '正常', color: 'text-green-700', bg: 'bg-green-100', icon: 'check' };
            };

            // 儲存
            const saveItem = async (data) => {
                const itemsRef = collection(db, 'artifacts', appIdPrefix, 'public', `family_${familyCode}`);
                if (data.id) {
                    const { id, ...rest } = data;
                    await updateDoc(doc(itemsRef, id), rest);
                } else {
                    await addDoc(itemsRef, { ...data, createdAt: new Date().toISOString() });
                }
                setCurrentView(selectedLocation ? 'location_detail' : 'dashboard');
            };

            // 備份匯出
            const doExport = () => {
                const blob = new Blob([JSON.stringify(items)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `庫存備份_${familyCode}.json`;
                a.click();
            };

            // --- 介面元件 ---
            const Nav = () => (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-[#E8DCC8] flex justify-around p-2 h-20 items-center z-50">
                    <button onClick={() => setCurrentView('dashboard')} className={`flex flex-col items-center ${currentView==='dashboard'?'text-[#8B6E52]':'text-gray-400'}`}>
                        <i data-lucide="home"></i><span className="text-xs mt-1">首頁</span>
                    </button>
                    <button onClick={() => { setEditingItem(null); setCurrentView('form'); }} className="bg-[#8B6E52] text-white p-4 rounded-full -mt-10 shadow-lg border-4 border-white">
                        <i data-lucide="plus"></i>
                    </button>
                    <button onClick={() => setCurrentView('search')} className={`flex flex-col items-center ${currentView==='search'?'text-[#8B6E52]':'text-gray-400'}`}>
                        <i data-lucide="search"></i><span className="text-xs mt-1">搜尋</span>
                    </button>
                </div>
            );

            // 重新渲染 Lucide 圖示
            useEffect(() => { lucide.createIcons(); });

            if (currentView === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#F5F0EA]">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-[#E8DCC8] w-full max-w-sm text-center">
                        <div className="text-6xl mb-4">🏠</div>
                        <h1 className="text-2xl font-bold text-[#5C4532] mb-6">家庭庫存代碼</h1>
                        <input type="text" id="c" placeholder="例如：happyhome" className="w-full bg-[#F9F6F0] border-2 border-[#E8DCC8] rounded-2xl p-4 text-center text-xl font-bold mb-4" />
                        <button onClick={() => {
                            const val = document.getElementById('c').value;
                            if(val) { localStorage.setItem('familyCode', val); setFamilyCode(val); setCurrentView('dashboard'); }
                        }} className="w-full bg-[#8B6E52] text-white font-bold py-4 rounded-2xl">進入同步系統</button>
                    </div>
                </div>
            );

            if (currentView === 'dashboard') return (
                <div className="p-4 pb-24 space-y-4">
                    <div className="flex justify-between items-center bg-[#D9CDBF] p-4 rounded-2xl text-[#5C4532]">
                        <div><h2 className="font-bold">代碼：{familyCode}</h2><p className="text-xs">跨設備自動同步中</p></div>
                        <button onClick={() => setCurrentView('settings')}><i data-lucide="settings"></i></button>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {LOCATIONS.map(l => (
                            <button key={l.id} onClick={() => { setSelectedLocation(l); setCurrentView('location_detail'); }} className="bg-white p-4 rounded-3xl border border-[#E8DCC8] text-left relative aspect-square flex flex-col justify-between shadow-sm active:scale-95">
                                <div><div className="text-4xl mb-1">{l.icon}</div><h3 className="font-bold text-[#5C4532]">{l.name}</h3></div>
                                <div className="text-[#8B6E52] text-xl font-bold">{items.filter(i=>i.location===l.id).length} 項</div>
                            </button>
                        ))}
                    </div>
                    <Nav />
                </div>
            );

            if (currentView === 'location_detail') return (
                <div className="p-4 pb-24 space-y-4">
                    <header className="flex items-center gap-3 mb-4">
                        <button onClick={()=>setCurrentView('dashboard')} className="p-2 bg-[#D9CDBF] rounded-full"><i data-lucide="chevron-left"></i></button>
                        <h2 className="text-xl font-bold">{selectedLocation.icon} {selectedLocation.name}</h2>
                    </header>
                    {items.filter(i=>i.location===selectedLocation.id).map(item => {
                        const s = getStatus(item.expiryDate);
                        return (
                            <div key={item.id} className="bg-white p-4 rounded-2xl border border-[#E8DCC8] flex items-center gap-4 shadow-sm">
                                <div className="w-14 h-14 bg-[#F5EBE1] rounded-xl flex items-center justify-center text-3xl overflow-hidden">
                                    {item.img ? <img src={item.img} className="w-full h-full object-cover" /> : '📦'}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <h3 className="font-bold truncate">{item.name} {item.other && <span className="text-xs text-gray-400">({item.other})</span>}</h3>
                                    <div className={`inline-block px-2 py-0.5 rounded text-xs mt-1 ${s.bg} ${s.color}`}>x{item.qty} · {item.expiryDate || '無效期'} {s.text}</div>
                                </div>
                                <button onClick={()=>{setEditingItem(item); setCurrentView('form');}} className="text-[#8B6E52] p-2 bg-[#F5EBE1] rounded-xl"><i data-lucide="edit-3"></i></button>
                            </div>
                        );
                    })}
                    <Nav />
                </div>
            );

            if (currentView === 'form') return (
                <div className="p-6 pb-24 bg-white min-h-screen">
                    <h2 className="text-2xl font-bold mb-6">{editingItem?.id ? '編輯' : '新增'}物品</h2>
                    <div className="space-y-4">
                        <div className="flex justify-center">
                            <button onClick={()=>document.getElementById('f').click()} className="w-32 h-32 bg-[#F5F0EA] rounded-3xl border-2 border-dashed border-[#8B6E52] flex flex-col items-center justify-center overflow-hidden">
                                {editingItem?.img ? <img src={editingItem.img} className="w-full h-full object-cover" /> : <><i data-lucide="camera"></i><span className="text-xs mt-1">拍照片</span></>}
                            </button>
                            <input type="file" id="f" accept="image/*" capture="environment" className="hidden" onChange={async (e)=>{
                                const reader = new FileReader();
                                reader.onload = (re) => {
                                    const img = new Image();
                                    img.onload = () => {
                                        const canvas = document.createElement('canvas');
                                        const ctx = canvas.getContext('2d');
                                        canvas.width = 400; canvas.height = (img.height/img.width)*400;
                                        ctx.drawImage(img, 0, 0, 400, canvas.height);
                                        setEditingItem({...editingItem, img: canvas.toDataURL('image/jpeg', 0.6)});
                                    };
                                    img.src = re.target.result;
                                };
                                reader.readAsDataURL(e.target.files[0]);
                            }} />
                        </div>
                        <div><label className="font-bold">名稱*</label><input type="text" id="n" defaultValue={editingItem?.name} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" /></div>
                        <div><label className="font-bold">數量*</label><input type="number" id="q" defaultValue={editingItem?.qty || 1} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" /></div>
                        <div><label className="font-bold">存放地點*</label>
                            <select id="l" defaultValue={editingItem?.location || 'fridge'} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" onChange={(e)=>setEditingItem({...editingItem, location: e.target.value})}>
                                {LOCATIONS.map(l=><option key={l.id} value={l.id}>{l.icon} {l.name}</option>)}
                            </select>
                        </div>
                        {(editingItem?.location === 'other' || document.getElementById('l')?.value === 'other') && 
                            <div><label className="font-bold">自訂地點備註*</label><input type="text" id="o" defaultValue={editingItem?.other} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" /></div>
                        }
                        <div><label className="font-bold">到期日</label><input type="date" id="d" defaultValue={editingItem?.expiryDate} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" /></div>
                        <button onClick={()=>{
                            const data = {
                                ...editingItem,
                                name: document.getElementById('n').value,
                                qty: Number(document.getElementById('q').value),
                                location: document.getElementById('l').value,
                                other: document.getElementById('o')?.value || '',
                                expiryDate: document.getElementById('d').value,
                            };
                            if(!data.name) return alert('請填寫名稱');
                            saveItem(data);
                        }} className="w-full bg-[#8B6E52] text-white py-4 rounded-2xl font-bold text-lg mt-4 shadow-md">確認儲存</button>
                        {editingItem?.id && <button onClick={()=> { if(confirm('確定刪除?')) deleteDoc(doc(db, 'artifacts', appIdPrefix, 'public', `family_${familyCode}`, editingItem.id)).then(()=>setCurrentView('dashboard')) }} className="w-full text-red-500 py-2">刪除物品</button>}
                        <button onClick={()=>setCurrentView('dashboard')} className="w-full text-gray-400 py-2">取消離開</button>
                    </div>
                </div>
            );

            if (currentView === 'settings') return (
                <div className="p-6 bg-[#F5F0EA] min-h-screen space-y-6">
                    <header className="flex items-center gap-3"><button onClick={()=>setCurrentView('dashboard')} className="p-2 bg-[#D9CDBF] rounded-full"><i data-lucide="chevron-left"></i></button><h2 className="text-xl font-bold">設定與備份</h2></header>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#E8DCC8] space-y-4">
                        <button onClick={doExport} className="w-full bg-[#8B6E52] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2"><i data-lucide="download"></i>匯出備份檔</button>
                        <button onClick={()=> { localStorage.removeItem('familyCode'); location.reload(); }} className="w-full bg-red-100 text-red-700 py-4 rounded-xl font-bold">登出 / 切換家庭代碼</button>
                    </div>
                </div>
            );

            if (currentView === 'search') return (
                <div className="p-4 pb-24 min-h-screen bg-[#F5F0EA]">
                    <input type="text" placeholder="搜尋物品..." className="w-full border-2 border-[#E8DCC8] rounded-2xl p-4 mb-4" onChange={e=>setKeyword(e.target.value)} />
                    <div className="space-y-3">
                        {items.filter(i=>i.name.includes(keyword)).map(item=>(
                            <div key={item.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                <div><h3 className="font-bold">{item.name}</h3><p className="text-xs text-gray-400">{LOCATIONS.find(l=>l.id===item.location).name} · x{item.qty}</p></div>
                                <button onClick={()=>{setEditingItem(item); setCurrentView('form');}} className="text-[#8B6E52]"><i data-lucide="edit"></i></button>
                            </div>
                        ))}
                    </div>
                    <Nav />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
