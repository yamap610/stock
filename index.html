<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭雲端庫存系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF9; color: #4A3F35; -webkit-tap-highlight-color: transparent; min-height: 100vh; }
        .input-label { font-size: 14px; font-weight: bold; color: #8E7860; margin-bottom: 4px; display: block; }
        .form-input { width: 100%; padding: 12px; border: 2px solid #E8DFCE; border-radius: 16px; outline: none; background: #FFFFFF; font-size: 16px; }
        .card-shadow { box-shadow: 0 8px 20px -4px rgba(164, 144, 124, 0.15); }
        .btn-primary { background: #A4907C; color: white; font-weight: bold; padding: 16px; border-radius: 20px; width: 100%; }
        .category-btn { border: 2px solid #E8DFCE; border-radius: 16px; padding: 10px; text-align: left; background: white; width: 100%; }
        .category-btn.active { border-color: #A4907C; background: #FAF8F5; ring: 2px; ring-color: #A4907C; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #A4907C; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28">

    <!-- 頂部導航 -->
    <header class="bg-[#D4C4B7] p-4 sticky top-0 z-[60] rounded-b-[24px] shadow-md flex justify-between items-center max-w-md mx-auto">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">📦 我們的家</h1>
        <div id="familyBadge" class="text-[11px] bg-white/30 text-white px-3 py-1 rounded-full font-bold border border-white/20">載入中...</div>
    </header>

    <!-- 初次進入的登入頁面 -->
    <div id="welcomePage" class="hidden fixed inset-0 z-[100] bg-[#FAF8F5] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="text-6xl mb-4">🏠</div>
            <h2 class="text-2xl font-bold mb-2">建立家庭群組</h2>
            <p class="text-[#A4907C] mb-6 text-sm">請輸入代碼來同步全家人的手機<br>(例如: WANG888)</p>
            <input type="text" id="initCode" placeholder="輸入自訂代碼" class="w-full p-4 border-2 border-[#D4C4B7] rounded-2xl text-center text-xl font-bold uppercase mb-4 outline-none">
            <button onclick="saveInitCode()" class="btn-primary text-lg">進入系統</button>
        </div>
    </div>

    <!-- 主顯示區 -->
    <main id="app" class="p-4 max-w-md mx-auto min-h-[60vh]">
        <div id="mainLoading" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-[#A4907C] font-bold">同步雲端資料中...</p>
        </div>
    </main>

    <!-- 底部切換欄 -->
    <nav id="navBar" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-[#E8DFCE] flex justify-around p-2 rounded-t-[28px] shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
        <button onclick="showPage('list')" class="nav-item flex flex-col items-center p-2 w-1/4 transition-all">
            <span class="text-xl">📋</span><span class="text-[10px] mt-1 font-bold">庫存清單</span>
        </button>
        <button onclick="showPage('add')" class="nav-item flex flex-col items-center p-2 w-1/4 transition-all">
            <div class="bg-[#A4907C] text-white p-3 rounded-2xl -mt-8 shadow-lg"><span class="text-xl">＋</span></div>
            <span class="text-[10px] mt-1 font-bold">新增物品</span>
        </button>
        <button onclick="showPage('settings')" class="nav-item flex flex-col items-center p-2 w-1/4 transition-all">
            <span class="text-xl">⚙️</span><span class="text-[10px] mt-1 font-bold">系統同步</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSKX93lBA2H9fheiDA_M3Wc3nOHYGpGbo",
            authDomain: "stock-a5e10.firebaseapp.com",
            databaseURL: "https://stock-a5e10-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "stock-a5e10",
            storageBucket: "stock-a5e10.firebasestorage.app",
            messagingSenderId: "699679970059",
            appId: "1:699679970059:web:dfea8903261a804ac4880e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let familyCode = localStorage.getItem('familyCode');
        let items = [];
        let unsubscribe = null;
        let selectedCategory = '🍚食物';
        let currentImage = '';
        window.currentPage = 'list';

        const categories = [
            { id: '🥩生鮮', label: '🥩 生鮮', sub: '如：肉、魚、蛋、蔬菜' },
            { id: '🍚食物', label: '🍚 食物', sub: '如：熟食、水果、麵包' },
            { id: '🥤飲品', label: '🥤 飲品', sub: '如：牛奶、果汁、飲料' },
            { id: '🧂醬料', label: '🧂 醬料', sub: '如：醬油、沙拉醬、調味料' },
            { id: '❄️冷凍', label: '❄️ 冷凍', sub: '如：冷凍食品、冷凍肉' }
        ];

        // 啟動檢測
        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            if (!familyCode) {
                document.getElementById('welcomePage').classList.remove('hidden');
                document.getElementById('mainLoading').classList.add('hidden');
            } else {
                startApp();
            }
        });

        window.saveInitCode = () => {
            const val = document.getElementById('initCode').value.trim().toUpperCase();
            if (val.length < 2) return alert("請輸入代碼");
            familyCode = val;
            localStorage.setItem('familyCode', familyCode);
            document.getElementById('welcomePage').classList.add('hidden');
            startApp();
        };

        function startApp() {
            document.getElementById('familyBadge').innerText = `群組: ${familyCode}`;
            startListening();
            showPage('list');
        }

        function startListening() {
            if (unsubscribe) unsubscribe();
            // 注意路徑必須符合規則
            const itemsRef = collection(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`);
            unsubscribe = onSnapshot(query(itemsRef), (snapshot) => {
                items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                items.sort((a, b) => (new Date(a.expiryDate || '9999-12-31') - new Date(b.expiryDate || '9999-12-31')));
                if (window.currentPage === 'list') renderList();
            }, (error) => {
                console.error("Firebase錯誤:", error);
                alert("雲端連線異常，請重新整理");
            });
        }

        window.showPage = (page) => {
            window.currentPage = page;
            const container = document.getElementById('app');
            
            if (page === 'list') renderList();
            else if (page === 'add') renderAddForm();
            else if (page === 'settings') renderSettings();

            document.querySelectorAll('.nav-item').forEach((btn, i) => {
                const targets = ['list', 'add', 'settings'];
                const isActive = targets[i] === page;
                btn.style.color = isActive ? '#A4907C' : '#B0A395';
                btn.style.opacity = isActive ? '1' : '0.6';
            });
        };

        function renderList() {
            const container = document.getElementById('app');
            if (items.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-[32px] p-10 text-center border border-[#F0EBE1] mt-6 card-shadow"><div class="text-5xl mb-4">🛒</div><h2 class="font-bold text-[#7A6A58]">目前還沒有物品</h2><p class="text-xs text-[#A4907C] mt-2">點擊中間的「＋」來新增物品</p></div>`;
                return;
            }
            let html = `<div class="grid gap-3">`;
            items.forEach(item => {
                const exp = getExpiryInfo(item.expiryDate);
                html += `
                <div class="bg-white rounded-[20px] p-3 card-shadow border border-[#E8DFCE] flex items-center gap-3">
                    <div class="w-14 h-14 rounded-xl bg-[#F5EFE6] flex items-center justify-center text-2xl shrink-0 overflow-hidden">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : (item.category || '📦').substring(0,2)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-[#4A3F35] truncate text-base">${item.name}</h3>
                            <span class="text-[9px] px-1.5 py-0.5 bg-[#FAF8F5] border rounded text-[#8E7860]">${item.location}</span>
                        </div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[11px] font-bold text-[#A4907C]">數量: ${item.quantity}</span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${exp.bg} ${exp.text}">${exp.label}</span>
                        </div>
                    </div>
                    <button onclick="deleteItem('${item.id}', '${item.name}')" class="text-red-300 p-2">✕</button>
                </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function renderAddForm() {
            const container = document.getElementById('app');
            currentImage = '';
            selectedCategory = '🍚食物';
            container.innerHTML = `
            <div class="bg-white rounded-[24px] p-5 card-shadow border border-[#E8DFCE] space-y-5 mb-10">
                <h2 class="text-center font-bold text-[#8E7860]">新增物資紀錄</h2>
                
                <div class="flex gap-2">
                    <button onclick="startScan()" class="flex-1 bg-[#FAF8F5] border-2 border-[#D4C4B7] p-3 rounded-xl flex flex-col items-center">
                        <span class="text-xl">🔍</span><span class="text-[10px] font-bold">條碼掃描</span>
                    </button>
                    <button onclick="document.getElementById('camInput').click()" class="flex-1 bg-[#FAF8F5] border-2 border-[#D4C4B7] p-3 rounded-xl flex flex-col items-center">
                        <span id="camIcon" class="text-xl">📷</span><span class="text-[10px] font-bold">拍攝照片</span>
                    </button>
                    <input type="file" id="camInput" accept="image/*" capture="environment" class="hidden" onchange="previewImg(this)">
                </div>

                <div id="readerUI" class="hidden rounded-xl overflow-hidden border-2 border-[#A4907C]"><div id="reader"></div></div>

                <div class="space-y-4">
                    <div><label class="input-label">物品名稱 (必填)</label><input type="text" id="itemName" placeholder="物品叫什麼名字？" class="form-input"></div>
                    <div>
                        <label class="input-label">存放位置 (必填)</label>
                        <select id="itemLocation" class="form-input">
                            <option value="冰箱冷藏">冰箱冷藏</option><option value="冷凍庫">冷凍庫</option>
                            <option value="廚房">廚房</option><option value="零食區">零食區</option>
                            <option value="廁所">廁所</option><option value="倉庫">倉庫</option><option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="input-label">物品分類 (必填)</label>
                        <div class="grid grid-cols-1 gap-2">
                            ${categories.map(c => `<button onclick="selectCat('${c.id}')" id="cat-${c.id}" class="category-btn ${c.id===selectedCategory?'active':''}"><div class="font-bold text-sm">${c.label} <span class="text-[10px] font-normal text-[#A4907C]">➡️ ${c.sub}</span></div></button>`).join('')}
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="input-label">數量</label><input type="number" id="itemQty" value="1" class="form-input text-center"></div>
                        <div><label class="input-label">備註</label><input type="text" id="itemNote" placeholder="選填" class="form-input"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="input-label">購入日</label><input type="date" id="pDate" class="form-input text-sm"></div>
                        <div><label class="input-label">到期日</label><input type="date" id="eDate" class="form-input text-sm"></div>
                    </div>
                    <button onclick="saveItem()" id="saveBtn" class="btn-primary mt-4">儲存到雲端</button>
                </div>
            </div>`;
        }

        function renderSettings() {
            const container = document.getElementById('app');
            container.innerHTML = `
            <div class="space-y-4">
                <div class="bg-white rounded-[24px] p-5 card-shadow border border-[#E8DFCE]">
                    <h3 class="font-bold text-[#8E7860] mb-2">同步代碼設定</h3>
                    <p class="text-[11px] text-[#A4907C] mb-4">目前代碼：<span class="text-[#4A3F35] font-bold">${familyCode}</span></p>
                    <input type="text" id="newCode" placeholder="更換代碼" class="form-input text-center font-bold mb-3">
                    <button onclick="updateCode()" class="btn-primary py-3 text-sm">套用新代碼</button>
                </div>
                <div class="bg-white rounded-[24px] p-5 card-shadow border border-[#E8DFCE]">
                    <h3 class="font-bold text-[#8E7860] mb-3">資料備份</h3>
                    <div class="flex gap-2">
                        <button onclick="exportData()" class="flex-1 bg-[#F5EFE6] p-3 rounded-xl font-bold text-xs">下載JSON備份</button>
                        <button onclick="document.getElementById('impInp').click()" class="flex-1 bg-[#F5EFE6] p-3 rounded-xl font-bold text-xs">導入備份檔</button>
                        <input type="file" id="impInp" accept=".json" class="hidden" onchange="importData(this)">
                    </div>
                </div>
            </div>`;
        }

        // 功能邏輯
        window.selectCat = (id) => {
            selectedCategory = id;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.toggle('active', b.id === `cat-${id}`));
        };

        window.previewImg = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { currentImage = e.target.result; document.getElementById('camIcon').innerText = "✅"; };
            reader.readAsDataURL(file);
        };

        window.startScan = () => {
            const ui = document.getElementById('readerUI');
            ui.classList.remove('hidden');
            const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render(async (text) => {
                scanner.clear(); ui.classList.add('hidden');
                try {
                    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${text}.json`);
                    const data = await res.json();
                    if(data.status === 1) document.getElementById('itemName').value = data.product.product_name;
                } catch(e) {}
            });
        };

        window.saveItem = async () => {
            const name = document.getElementById('itemName').value.trim();
            if (!name) return alert("請輸入名稱");
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "儲存中...";
            try {
                await addDoc(collection(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`), {
                    name, location: document.getElementById('itemLocation').value,
                    category: selectedCategory, quantity: document.getElementById('itemQty').value,
                    expiryDate: document.getElementById('eDate').value, purchaseDate: document.getElementById('pDate').value,
                    note: document.getElementById('itemNote').value, image: currentImage, createdAt: Date.now()
                });
                showPage('list');
            } catch (e) { alert("儲存失敗"); btn.disabled = false; btn.innerText = "儲存到雲端"; }
        };

        window.deleteItem = async (id, name) => {
            if (confirm(`刪除「${name}」？`)) await deleteDoc(doc(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`, id));
        };

        window.updateCode = () => {
            const c = document.getElementById('newCode').value.trim().toUpperCase();
            if (c) { familyCode = c; localStorage.setItem('familyCode', c); location.reload(); }
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(items)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `backup_${familyCode}.json`; a.click();
        };

        window.importData = (input) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = JSON.parse(e.target.result);
                for (const i of data) {
                    const {id, ...payload} = i;
                    await addDoc(collection(db, 'artifacts', 'family-inventory', 'public', 'data', `list_${familyCode}`), payload);
                }
                alert("導入完成"); showPage('list');
            };
            reader.readAsText(input.files[0]);
        };

        function getExpiryInfo(date) {
            if (!date) return { label: '未填', bg: 'bg-gray-50', text: 'text-gray-400' };
            const diff = Math.ceil((new Date(date) - new Date().setHours(0,0,0,0)) / 86400000);
            if (diff < 0) return { label: '已過期', bg: 'bg-red-50', text: 'text-red-500' };
            if (diff <= 7) return { label: `快到期(${diff}天)`, bg: 'bg-orange-50', text: 'text-orange-500' };
            return { label: `${diff}天`, bg: 'bg-green-50', text: 'text-green-600' };
        }
    </script>
</body>
</html>
