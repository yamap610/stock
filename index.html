<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭庫存管家 - 免設定版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F5F0EA; -webkit-tap-highlight-color: transparent; }
        .nichi-card { background: white; border-radius: 1.5rem; border: 1px solid #E8DCC8; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 根據您的 Firebase 控制台完整填入 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB3_lR5_h3X2_Z3_X3_Z3_X3_Z3_X3", 
            authDomain: "yamap610-stock.firebaseapp.com",
            projectId: "yamap610-stock",
            storageBucket: "yamap610-stock.appspot.com",
            messagingSenderId: "367375176503",
            appId: "1:367375176503:web:757827818e6e5828e833f4"
        };

        const LOCATIONS = [
            { id: 'fridge', name: '冷藏', icon: '🧊' },
            { id: 'freezer', name: '冷凍', icon: '❄️' },
            { id: 'kitchen', name: '廚房', icon: '🍳' },
            { id: 'warehouse', name: '倉庫', icon: '📦' },
            { id: 'other', name: '其他', icon: '🏷️' }
        ];

        async function initApp() {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
            const { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            function InventoryApp() {
                const [familyCode, setFamilyCode] = useState(localStorage.getItem('familyCode') || '');
                const [view, setView] = useState(familyCode ? 'main' : 'login');
                const [items, setItems] = useState([]);
                const [editItem, setEditItem] = useState(null);

                // 監聽資料 - 因為規則是 if true，不需要登入即可讀取
                useEffect(() => {
                    if (!familyCode || view === 'login') return;
                    const colRef = collection(db, 'family_inventory', familyCode, 'items');
                    return onSnapshot(colRef, (snap) => {
                        setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }, [familyCode, view]);

                useEffect(() => { if(window.lucide) lucide.createIcons(); });

                const save = async (data) => {
                    const colRef = collection(db, 'family_inventory', familyCode, 'items');
                    if (data.id) {
                        const { id, ...payload } = data;
                        await updateDoc(doc(db, 'family_inventory', familyCode, 'items', id), payload);
                    } else {
                        await addDoc(colRef, { ...data, time: Date.now() });
                    }
                    setView('main');
                };

                if (view === 'login') return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-center">
                        <div className="nichi-card p-8 w-full max-w-sm">
                            <div className="text-5xl mb-4">🏠</div>
                            <h1 className="text-xl font-bold mb-6 text-[#5C4532]">請輸入家庭共同代碼</h1>
                            <input type="text" id="code" placeholder="例如：happy123" className="w-full border-2 border-[#E8DCC8] rounded-xl p-4 text-center text-lg font-bold mb-4" />
                            <button onClick={() => {
                                const v = document.getElementById('code').value;
                                if(v) { localStorage.setItem('familyCode', v); setFamilyCode(v); setView('main'); }
                            }} className="w-full bg-[#8B6E52] text-white py-4 rounded-xl font-bold">進入系統</button>
                        </div>
                    </div>
                );

                if (view === 'main') return (
                    <div className="p-4 pb-24 max-w-md mx-auto">
                        <div className="bg-[#D9CDBF] p-4 rounded-2xl mb-6 flex justify-between items-center text-[#5C4532]">
                            <span className="font-bold">家：{familyCode}</span>
                            <button onClick={() => { localStorage.removeItem('familyCode'); location.reload(); }} className="text-xs underline">登出</button>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            {LOCATIONS.map(l => (
                                <button key={l.id} onClick={() => { setEditItem({ location: l.id }); setView('form'); }} className="nichi-card p-5 text-left aspect-square flex flex-col justify-between active:scale-95 transition-all">
                                    <div className="text-4xl">{l.icon}</div>
                                    <div className="text-[#8B6E52] font-bold text-2xl">{items.filter(i=>i.location===l.id).length}</div>
                                    <div className="font-bold text-[#5C4532]">{l.name}</div>
                                </button>
                            ))}
                        </div>
                        <div className="fixed bottom-8 left-0 right-0 flex justify-center">
                            <button onClick={() => { setEditItem(null); setView('form'); }} className="w-16 h-16 bg-[#8B6E52] text-white rounded-full shadow-xl flex items-center justify-center border-4 border-white">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>
                    </div>
                );

                if (view === 'form') return (
                    <div className="p-6 bg-white min-h-screen">
                        <h2 className="text-xl font-bold mb-6 text-[#5C4532]">新增/修改物品</h2>
                        <div className="space-y-4">
                            <div><label className="text-sm font-bold text-[#8B6E52]">品名</label><input type="text" id="n" defaultValue={editItem?.name} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" /></div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-sm font-bold text-[#8B6E52]">數量</label><input type="number" id="q" defaultValue={editItem?.qty || 1} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1" /></div>
                                <div><label className="text-sm font-bold text-[#8B6E52]">地點</label>
                                    <select id="l" defaultValue={editItem?.location} className="w-full border-2 border-[#E8DCC8] rounded-xl p-3 mt-1">
                                        {LOCATIONS.map(l=><option key={l.id} value={l.id}>{l.icon} {l.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <button onClick={() => {
                                const d = {
                                    ...editItem,
                                    name: document.getElementById('n').value,
                                    qty: Number(document.getElementById('q').value),
                                    location: document.getElementById('l').value
                                };
                                if(!d.name) return alert('請填寫品名');
                                save(d);
                            }} className="w-full bg-[#8B6E52] text-white py-4 rounded-xl font-bold shadow-lg">儲存並同步</button>
                            <button onClick={() => setView('main')} className="w-full text-gray-400 py-2">取消</button>
                        </div>
                    </div>
                );
            }

            ReactDOM.createRoot(document.getElementById('root')).render(<InventoryApp />);
        }

        initApp();
    </script>
</body>
</html>
