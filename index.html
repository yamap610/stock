<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏠 家用庫存系統</title>
    <!-- 載入必要套件 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fdfaf6', 100: '#f7f0e6', 200: '#eddcc8', 300: '#dec1a2', 400: '#ca9f78', 500: '#b88155', 600: '#9b6443', 700: '#81513a', 800: '#694334', 900: '#56382d' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfaf6; color: #56382d; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 4px 20px -4px rgba(86, 56, 45, 0.1); }
        .ios-active:active { transform: scale(0.96); transition: transform 0.1s; }
        input, select { font-size: 16px !important; } /* 防止 iOS 自動放大 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 你的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDIK4YtcIEsYi9BiaGeEdG8Uc3VLHY9WoA",
            authDomain: "stockapp-a1ccc.firebaseapp.com",
            projectId: "stockapp-a1ccc",
            storageBucket: "stockapp-a1ccc.firebasestorage.app",
            messagingSenderId: "710931143817",
            appId: "1:710931143817:web:a2a5b6975b2b06124a7a58"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.familyApp = { auth, db, signInAnonymously, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp };
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        const LOCATIONS = ["冰箱", "廚房", "零食櫃", "小倉庫", "藥品櫃", "洗手間", "其他"];
        const CATEGORIES = ["食品飲料", "衛生用品", "生活用品", "清潔用品", "藥品保健", "其他"];
        const EMOJI = { "食品飲料": "🍙", "衛生用品": "🧻", "生活用品": "📦", "清潔用品": "🧹", "藥品保健": "💊", "其他": "📌" };

        function App() {
            const [items, setItems] = useState([]);
            const [view, setView] = useState('list');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                let unsub = null;
                const init = async () => {
                    try {
                        const { auth, signInAnonymously, db, collection, query, orderBy, onSnapshot } = window.familyApp;
                        await signInAnonymously(auth);
                        
                        const q = query(collection(db, 'inventory'), orderBy('createdAt', 'desc'));
                        unsub = onSnapshot(q, (snap) => {
                            setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                            setLoading(false);
                        }, (err) => {
                            setError("資料讀取失敗，請確認 Firebase Rules 是否發布。");
                            setLoading(false);
                        });
                    } catch (e) {
                        setError("網路連線失敗，請稍後再試。");
                        setLoading(false);
                    }
                };
                init();
                return () => unsub && unsub();
            }, []);

            const handleSave = async (e) => {
                e.preventDefault();
                const { db, collection, addDoc, serverTimestamp } = window.familyApp;
                const f = e.target;
                try {
                    await addDoc(collection(db, 'inventory'), {
                        name: f.name.value,
                        qty: Number(f.qty.value),
                        loc: f.loc.value,
                        cat: f.cat.value,
                        emoji: EMOJI[f.cat.value] || "📦",
                        createdAt: serverTimestamp()
                    });
                    setView('list');
                } catch (e) { alert("儲存失敗！"); }
            };

            const adjustQty = async (id, cur, d) => {
                const { db, doc, updateDoc, deleteDoc } = window.familyApp;
                const newQty = cur + d;
                if (newQty <= 0) {
                    if(confirm("確定要刪除這項物品嗎？")) {
                        await deleteDoc(doc(db, 'inventory', id));
                    }
                } else {
                    await updateDoc(doc(db, 'inventory', id), { qty: newQty });
                }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-brand-50">
                    <div className="w-10 h-10 border-4 border-brand-200 border-t-brand-800 rounded-full animate-spin mb-4"></div>
                    <p className="font-bold text-brand-500">雲端連線中...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen p-10 flex flex-col items-center justify-center text-center bg-brand-50">
                    <i className="ph ph-warning-circle text-6xl text-red-400 mb-4"></i>
                    <h2 className="font-bold text-brand-900 text-xl mb-2">無法連線</h2>
                    <p className="text-brand-500 text-sm mb-8">{error}</p>
                    <button onClick={() => window.location.reload()} className="w-full py-4 bg-brand-800 text-white rounded-full font-bold shadow-lg">點我重試</button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28">
                    <header className="p-8 pb-4 flex justify-between items-end">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-brand-900 rounded-xl flex items-center justify-center text-white text-xl">🏠</div>
                            <h1 className="text-2xl font-black text-brand-900 tracking-tighter">家庭庫存</h1>
                        </div>
                        <div className="text-brand-400 font-bold text-sm bg-white px-4 py-1 rounded-full card-shadow">{items.length} 件</div>
                    </header>

                    <main className="px-6 space-y-4">
                        {view === 'list' ? (
                            <>
                                {items.map(item => (
                                    <div key={item.id} className="bg-white p-4 rounded-3xl card-shadow flex items-center gap-4 border border-brand-50">
                                        <div className="text-3xl bg-brand-50 w-14 h-14 rounded-2xl flex items-center justify-center">{item.emoji}</div>
                                        <div className="flex-1 font-bold truncate">
                                            {item.name} 
                                            <div className="text-[10px] text-brand-400 font-black italic">📍 {item.loc}</div>
                                        </div>
                                        <div className="flex items-center gap-2 bg-brand-50 rounded-full p-1 border border-brand-100">
                                            <button onClick={() => adjustQty(item.id, item.qty, -1)} className="w-8 h-8 rounded-full bg-white shadow-sm font-bold text-brand-600 ios-active">-</button>
                                            <span className="w-6 text-center font-black text-brand-900">{item.qty}</span>
                                            <button onClick={() => adjustQty(item.id, item.qty, 1)} className="w-8 h-8 rounded-full bg-white shadow-sm font-bold text-brand-600 ios-active">+</button>
                                        </div>
                                    </div>
                                ))}
                                {items.length === 0 && <div className="text-center py-20 text-brand-200 font-bold italic opacity-60">還沒有物品，點下方按鈕新增！</div>}
                            </>
                        ) : (
                            <form onSubmit={handleSave} className="bg-white p-8 rounded-[3rem] card-shadow space-y-6">
                                <h2 className="text-2xl font-black text-center text-brand-900 italic">✨ 新增庫存</h2>
                                <div className="space-y-4">
                                    <input name="name" required placeholder="物品名稱（如：鮮奶）" className="w-full p-4 bg-brand-50 rounded-2xl outline-none font-bold focus:bg-white border-2 border-transparent focus:border-brand-200 transition-all" />
                                    <div className="flex gap-2">
                                        <input name="qty" type="number" defaultValue="1" className="w-24 p-4 bg-brand-50 rounded-2xl outline-none font-black text-center text-xl" />
                                        <select name="loc" className="flex-1 p-4 bg-brand-50 rounded-2xl outline-none font-bold">{LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}</select>
                                    </div>
                                    <select name="cat" className="w-full p-4 bg-brand-50 rounded-2xl outline-none font-bold">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                </div>
                                <div className="flex gap-4 pt-4">
                                    <button type="button" onClick={() => setView('list')} className="flex-1 py-4 bg-brand-100 text-brand-700 rounded-full font-black">取消</button>
                                    <button type="submit" className="flex-1 py-4 bg-brand-800 text-white rounded-full font-black shadow-lg ios-active">儲存</button>
                                </div>
                            </form>
                        )}
                    </main>

                    <button 
                        onClick={() => setView(view === 'list' ? 'add' : 'list')}
                        className="fixed bottom-10 left-1/2 -translate-x-1/2 w-16 h-16 bg-brand-900 text-white rounded-full shadow-2xl flex items-center justify-center z-50 border-4 border-white ios-active"
                    >
                        <i className={`ph ph-bold ${view === 'list' ? 'ph-plus' : 'ph-house'} text-2xl`}></i>
                    </button>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
